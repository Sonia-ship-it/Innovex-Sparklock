services:
  # ─── PostgreSQL (Auth, Notification, History) ───
  postgres:
    image: postgres:16-alpine
    container_name: sparklock-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: sparklock
      POSTGRES_PASSWORD: sparklock_secret
      POSTGRES_DB: sparklock_auth
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql

  # ─── Redis (Session / OTP caching) ───
  redis:
    image: redis:7-alpine
    container_name: sparklock-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # ─── Zookeeper (Kafka dependency) ───
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: sparklock-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data

  # ─── Kafka (Event streaming) ───
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: sparklock-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data

  # ─── TimescaleDB (Monitoring sensor data) ───
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: sparklock-timescaledb
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: sparklock
      POSTGRES_PASSWORD: sparklock_secret
      POSTGRES_DB: sparklock_monitoring
    volumes:
      - timescale_data:/var/lib/postgresql/data

  # ─── Nginx API Gateway ───
  nginx:
    image: nginx:alpine
    container_name: sparklock-gateway
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - postgres
      - redis
      - kafka
      - timescaledb

volumes:
  postgres_data:
  redis_data:
  zookeeper_data:
  kafka_data:
  timescale_data:
