events {
    worker_connections 1024;
}

http {
    upstream auth_service {
        server host.docker.internal:8081;
    }

    upstream monitoring_service {
        server host.docker.internal:3001;
    }

    upstream notification_service {
        server host.docker.internal:3000;
    }

    upstream history_service {
        server host.docker.internal:8082;
    }

    server {
        listen 80;
        server_name localhost;

        # ── Auth Service ──
        location /auth/ {
            proxy_pass http://auth_service/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Monitoring Service ──
        location /monitor/ {
            proxy_pass http://monitoring_service/monitor/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support for live data
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ── Notification Service ──
        location /notify/ {
            proxy_pass http://notification_service/notify/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── History Service ──
        location /history/ {
            proxy_pass http://history_service/history/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Health Check ──
        location /health {
            return 200 '{"status":"ok","gateway":"sparklock"}';
            add_header Content-Type application/json;
        }
    }
}
